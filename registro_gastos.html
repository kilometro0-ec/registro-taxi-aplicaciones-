<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "on-tertiary-fixed-variant": "#832700", "secondary": "#455f88", "on-primary": "#ffffff", "on-tertiary": "#ffffff", "surface-container-low": "#eff4ff", "surface-tint": "#1c6b4d", "outline": "#6f7973", "primary-fixed": "#a6f2cc", "secondary-container": "#b6d0ff", "surface-container-lowest": "#ffffff", "outline-variant": "#bfc9c1", "primary-fixed-dim": "#8bd6b1", "on-surface-variant": "#3f4943", "on-tertiary-fixed": "#390c00", "tertiary-fixed-dim": "#ffb59c", "surface-dim": "#cbdbf5", "on-primary-container": "#90dbb6", "on-background": "#0b1c30", "error": "#ba1a1a", "surface": "#f8f9ff", "primary": "#004831", "tertiary": "#752200", "on-surface": "#0b1c30", "on-secondary-fixed": "#001b3c", "surface-container-high": "#dce9ff", "secondary-fixed-dim": "#adc7f7", "on-error": "#ffffff", "on-error-container": "#93000a", "on-secondary": "#ffffff", "surface-container-highest": "#d3e4fe", "on-primary-fixed-variant": "#005138", "on-secondary-fixed-variant": "#2d476f", "on-secondary-container": "#3f5882", "tertiary-fixed": "#ffdbcf", "inverse-on-surface": "#eaf1ff" }, "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" }, "spacing": { "base": "8px", "card-padding": "20px", "margin-mobile": "16px", "touch-target-min": "48px", "gutter": "12px" }, "fontFamily": { "headline-lg-mobile": ["Inter"], "data-mono": ["Inter"], "label-caps": ["Inter"], "display-earnings": ["Inter"], "headline-lg": ["Inter"], "body-md": ["Inter"] }, "fontSize": { "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}], "data-mono": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.2px", "fontWeight": "600"}], "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "700"}], "display-earnings": ["40px", {"lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "700"}], "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}], "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}] } } } }
</script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; } .active-category { border: 2px solid #004831 !important; background-color: #a6f2cc !important; } body { min-height: max(884px, 100dvh); }</style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col pb-20">
<header class="bg-surface flex justify-between items-center px-margin-mobile h-touch-target-min w-full max-w-full border-b border-outline-variant sticky top-0 z-40">
<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden"><img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTQlZhJHlDYyTxd7fn1UXOm37bMNo5Hx7P-hfTUuPoje7By8kZRc83mrPuRZIA5TyzArBV8BwsfU1c8XXM0gD80_650deWfy8LF7uu5o1hW4tw9fTH45l1UaUzP31we8CGcevcG-LEdpvmLuyLSmD9ImSkk5m9l1Hr4jXt0SbtGeGj2sT5ljgs7VER8WB1QUv9lLD98Lbf-8DJ5PzqLBjX7aAF0zIhb3dIUsRVC-5EnPgC4r5TFq3oIwej7pxAYOsoqX_-4mvdDVsm"/></div><h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Driver Insights</h1></div>
<button class="text-on-surface-variant hover:bg-surface-container-high p-2 rounded-full"><span class="material-symbols-outlined">calendar_today</span></button>
</header>
<main class="flex-1 px-margin-mobile pt-gutter">
<div class="mb-6"><h2 class="font-headline-lg-mobile text-headline-lg-mobile">Registrar Gasto</h2><p class="text-on-surface-variant font-label-caps uppercase tracking-wider">Controla tus costos de operación</p></div>
<section class="bg-white rounded-xl border border-outline-variant p-card-padding mb-gutter shadow-sm">
    <!-- Nueva fila: Plataforma (por defecto) -->
    <div class="mb-4">
        <label class="font-label-caps text-on-surface-variant mb-1 block">PLATAFORMA</label>
        <select id="plataformaGasto" class="w-full h-[56px] px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary font-body-md">
            <option value="Uber">Uber</option>
            <option value="DiDi">DiDi</option>
            <option value="Indriver">Indriver</option>
            <option value="Otro">Otro</option>
        </select>
        <div class="flex items-center mt-2">
            <input type="checkbox" id="recordarPlataforma" class="mr-2">
            <label for="recordarPlataforma" class="text-xs text-on-surface-variant">Recordar esta plataforma para próximos gastos</label>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <div><label class="font-label-caps text-on-surface-variant mb-1 block">MONTO</label><div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-primary">$</span><input id="montoGasto" class="w-full h-[56px] pl-8 pr-4 bg-surface-container-low border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary font-data-mono text-xl" placeholder="0.00" type="number" step="0.01"/></div></div>
        <div><label class="font-label-caps text-on-surface-variant mb-1 block">FECHA</label><input id="fechaGasto" class="w-full h-[56px] px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary font-body-md" type="date"/></div>
    </div>
    <label class="font-label-caps text-on-surface-variant mb-3 block">CATEGORÍA</label>
    <div class="grid grid-cols-3 gap-2 mb-6" id="categoryGrid">
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Combustible')"><span class="material-symbols-outlined mb-1">local_gas_station</span><span class="text-[10px] font-bold">Combustible</span></button>
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Mantenimiento')"><span class="material-symbols-outlined mb-1">build</span><span class="text-[10px] font-bold">Mantenimiento</span></button>
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Lavado')"><span class="material-symbols-outlined mb-1">local_car_wash</span><span class="text-[10px] font-bold">Lavado</span></button>
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Comisión')"><span class="material-symbols-outlined mb-1">account_balance_wallet</span><span class="text-[10px] font-bold">Comisión</span></button>
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Seguro')"><span class="material-symbols-outlined mb-1">verified_user</span><span class="text-[10px] font-bold">Seguro</span></button>
        <button type="button" class="flex flex-col items-center justify-center p-3 border border-outline-variant rounded-lg" onclick="selectCategory(this, 'Otro')"><span class="material-symbols-outlined mb-1">more_horiz</span><span class="text-[10px] font-bold">Otro</span></button>
    </div>
    <!-- Opcional: Subir comprobante (sin implementación real) -->
    <div class="mb-6"><label class="font-label-caps text-on-surface-variant mb-1 block">ADJUNTAR COMPROBANTE</label><div class="border-2 border-dashed border-outline-variant rounded-xl h-24 flex flex-col items-center justify-center bg-surface hover:bg-surface-container-low transition-colors cursor-pointer group"><span class="material-symbols-outlined text-primary mb-1 group-hover:scale-110 transition-transform">add_a_photo</span><span class="font-label-caps text-primary">Subir o Capturar</span></div></div>
    <button id="saveExpenseBtn" class="w-full h-14 bg-primary text-white rounded-lg font-bold text-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined">save</span> Guardar Gasto</button>
</section>
<section class="mb-10"><div class="flex items-center justify-between mb-3 px-2"><h3 class="font-headline-lg-mobile text-sm uppercase text-on-surface-variant opacity-80">Actividad de Hoy</h3><span class="font-data-mono text-tertiary" id="totalHoy">$0.00</span></div><div class="space-y-2" id="todayActivity">No hay gastos registrados hoy.</div></section>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-gutter bg-surface border-t border-outline-variant">
<a href="Dashboard.html" class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1"><span class="material-symbols-outlined">dashboard</span><span class="font-label-caps text-label-caps">Panel</span></a>
<a href="registro_ingresos.html" class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1"><span class="material-symbols-outlined">payments</span><span class="font-label-caps text-label-caps">Viajes</span></a>
<a href="registro_gastos.html" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1"><span class="material-symbols-outlined" style="font-variation-settings:'FILL'1;">receipt_long</span><span class="font-label-caps text-label-caps">Gastos</span></a>
<a href="reporte_estadisticas.html" class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1"><span class="material-symbols-outlined">analytics</span><span class="font-label-caps text-label-caps">Analytics</span></a>
</nav>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIe-N47TdCtmNHObEgbC4aRe8evzn2l9Fw-X7_4MB-kNGCMwcHnCyOg-xGXamTWeqcVg/exec'; // CAMBIAR POR TU URL
    let selectedCategory = 'Combustible';

    function selectCategory(btn, category) {
        selectedCategory = category;
        document.querySelectorAll('#categoryGrid button').forEach(b => b.classList.remove('active-category'));
        btn.classList.add('active-category');
    }

    // Cargar plataforma guardada
    const plataformaSelect = document.getElementById('plataformaGasto');
    const recordarCheck = document.getElementById('recordarPlataforma');
    const savedPlatform = localStorage.getItem('plataformaPredeterminada');
    if (savedPlatform) {
        plataformaSelect.value = savedPlatform;
        recordarCheck.checked = true;
    }

    // Guardar si se marca "recordar"
    recordarCheck.addEventListener('change', () => {
        if (recordarCheck.checked) {
            localStorage.setItem('plataformaPredeterminada', plataformaSelect.value);
        } else {
            localStorage.removeItem('plataformaPredeterminada');
        }
    });
    plataformaSelect.addEventListener('change', () => {
        if (recordarCheck.checked) {
            localStorage.setItem('plataformaPredeterminada', plataformaSelect.value);
        }
    });

    // Fecha actual por defecto
    document.getElementById('fechaGasto').valueAsDate = new Date();

    // Envío del gasto
    document.getElementById('saveExpenseBtn').addEventListener('click', async () => {
        const monto = parseFloat(document.getElementById('montoGasto').value);
        const fecha = document.getElementById('fechaGasto').value;
        const plataforma = plataformaSelect.value;

        if (isNaN(monto) || monto <= 0) {
            alert('Ingresa un monto válido');
            return;
        }

        const params = new URLSearchParams();
        params.append('action', 'addExpense');
        params.append('categoria', selectedCategory);
        params.append('monto', monto);
        params.append('fecha', fecha);
        params.append('descripcion', `Plataforma: ${plataforma}`); // Incluimos la plataforma en la descripción

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
            alert('✅ Gasto registrado correctamente');
            // Limpiar monto y dejar los demás campos (opcional)
            document.getElementById('montoGasto').value = '';
            // Opcional: recargar el dashboard o volver atrás
            location.href = 'Dashboard.html';
        } catch(e) {
            alert('❌ Error al guardar. Revisa tu conexión o la URL del script.');
        }
    });

    // Seleccionar primera categoría por defecto
    document.querySelector('#categoryGrid button').click();
</script>
</body>
</html>
