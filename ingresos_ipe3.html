<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Registro de Servicio Electrónico</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Inter', sans-serif; background: #f8f9ff; }
    .loading-spinner { width: 24px; height: 24px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-background min-h-screen pb-24">
<header class="bg-surface border-b border-outline-variant flex justify-between items-center px-4 h-12 w-full sticky top-0 z-50">
    <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-electronica-primary flex items-center justify-center"><span class="material-symbols-outlined text-white">smart_toy</span></div><h1 class="text-xl font-bold text-electronica-primary">Driver Insights 🤖</h1></div>
    <button onclick="history.back()" class="material-symbols-outlined text-electronica-primary">arrow_back</button>
</header>
<main class="px-4 py-6 max-w-2xl mx-auto space-y-6">
    <header><h2 class="text-2xl font-bold">Registro de Servicio Electrónico</h2><p class="text-sm text-on-surface-variant">Complete los detalles del trabajo realizado.</p></header>
    <section class="space-y-3"><label class="text-xs font-bold uppercase">Tipo de Servicio</label><div class="grid grid-cols-2 gap-2"><button class="service-btn border border-outline flex flex-col items-center justify-center p-4 rounded-xl transition-all bg-surface hover:bg-surface-container-high" data-service="Instalación" onclick="selectService(this)">🤖 Instalación</button><button class="service-btn border border-outline flex flex-col items-center justify-center p-4 rounded-xl transition-all bg-surface hover:bg-surface-container-high" data-service="Reparación" onclick="selectService(this)">🔧 Reparación</button><button class="service-btn border border-outline flex flex-col items-center justify-center p-4 rounded-xl transition-all bg-surface hover:bg-surface-container-high" data-service="Mantenimiento" onclick="selectService(this)">⚙️ Mantenimiento</button><button class="service-btn border border-outline flex flex-col items-center justify-center p-4 rounded-xl transition-all bg-surface hover:bg-surface-container-high" data-service="Consultoría" onclick="selectService(this)">💡 Consultoría</button></div></section>
    <section class="space-y-4"><div><label class="text-xs font-bold uppercase">Nombre del Cliente</label><input id="cliente" class="w-full h-14 px-4 bg-surface border rounded-xl" placeholder="Ej. Juan Pérez"></div><div><label class="text-xs font-bold uppercase">Descripción del Trabajo</label><textarea id="descripcion" rows="3" class="w-full p-4 bg-surface border rounded-xl" placeholder="Detalle las tareas realizadas..."></textarea></div></section>
    <section class="bg-surface border rounded-xl p-5 space-y-4"><h3 class="text-xs font-bold uppercase">Desglose de Costos</h3><div class="grid grid-cols-2 gap-4"><div><label>Mano de Obra</label><div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2">$</span><input id="labor" type="number" step="0.01" class="w-full h-12 pl-8 pr-4 bg-surface-container-low border rounded-lg" placeholder="0.00" oninput="calcularTotal()"></div></div><div><label>Materiales</label><div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2">$</span><input id="materials" type="number" step="0.01" class="w-full h-12 pl-8 pr-4 bg-surface-container-low border rounded-lg" placeholder="0.00" oninput="calcularTotal()"></div></div></div><div class="border-t pt-4 flex justify-between items-baseline"><span class="text-lg font-bold">Precio Total</span><span class="text-3xl font-bold text-electronica-primary" id="totalPrecio">$0.00</span></div></section>
    <section class="flex items-center justify-between bg-surface border rounded-xl p-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-electronica-primary" id="statusIcon">pending_actions</span><div><p class="text-xs font-bold uppercase">Estado de Pago</p><p class="font-bold" id="statusLabel">Pendiente</p></div></div><button class="w-14 h-8 rounded-full bg-outline-variant relative transition-colors" id="togglePago" onclick="togglePago()"><div class="absolute left-1 top-1 w-6 h-6 bg-white rounded-full transition-transform" id="toggleKnob"></div></button></section>
    <div class="pt-4"><button id="guardarBtn" class="w-full h-14 bg-electronica-primary text-white rounded-xl font-bold flex items-center justify-center gap-2"><span class="material-symbols-outlined">save</span> Registrar Ingreso</button></div>
</main>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqiJKDDXKRM_7xBR8NhDC43BVpsyrqyI3mZeY5w_w6vroHubh1KjlBExGw66MmeZX_Rg/exec';
    let tipoServicio = 'Instalación', pagoPagado = false;
    function selectService(btn) { document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('bg-electronica-primary', 'text-white', 'border-electronica-primary')); btn.classList.add('bg-electronica-primary', 'text-white', 'border-electronica-primary'); tipoServicio = btn.getAttribute('data-service'); }
    function calcularTotal() { const total = (parseFloat(document.getElementById('labor').value)||0) + (parseFloat(document.getElementById('materials').value)||0); document.getElementById('totalPrecio').innerText = `$${total.toFixed(2)}`; }
    function togglePago() { pagoPagado = !pagoPagado; const knob = document.getElementById('toggleKnob'), label = document.getElementById('statusLabel'), icon = document.getElementById('statusIcon'), btn = document.getElementById('togglePago'); if(pagoPagado){ btn.classList.remove('bg-outline-variant'); btn.classList.add('bg-electronica-primary'); knob.style.transform='translateX(24px)'; label.innerText='Pagado'; icon.innerText='check_circle'; } else { btn.classList.remove('bg-electronica-primary'); btn.classList.add('bg-outline-variant'); knob.style.transform='translateX(0)'; label.innerText='Pendiente'; icon.innerText='pending_actions'; } }
    document.getElementById('guardarBtn').addEventListener('click', async () => {
        const cliente = document.getElementById('cliente').value.trim(), desc = document.getElementById('descripcion').value.trim(), labor = parseFloat(document.getElementById('labor').value)||0, materials = parseFloat(document.getElementById('materials').value)||0, total = labor+materials;
        if (total <= 0) { alert('El monto total debe ser mayor a 0'); return; }
        const fecha = new Date().toISOString().split('T')[0];
        const notas = `Cliente: ${cliente} | Servicio: ${tipoServicio} | Descripción: ${desc} | Mano de obra: $${labor} | Materiales: $${materials} | Pago: ${pagoPagado ? 'Pagado' : 'Pendiente'}`;
        const params = new URLSearchParams(); params.append('action', 'addIncome'); params.append('plataforma', 'Electrónica'); params.append('rubro', 'Electrónica'); params.append('monto', total); params.append('fecha', fecha); params.append('notas', notas);
        const btn = document.getElementById('guardarBtn'); const original = btn.innerHTML; btn.innerHTML = '<div class="loading-spinner"></div> Guardando...'; btn.disabled = true;
        try { const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params }); const txt = await res.text(); if (res.ok && txt.includes('OK')) alert('✅ Ingreso registrado'); else alert('❌ Error: ' + txt); window.location.href = 'Dashboard.html'; } catch(e) { alert('❌ Error de conexión: ' + e.message); } finally { btn.innerHTML = original; btn.disabled = false; }
    });
    document.querySelector('.service-btn').click(); calcularTotal();
</script>
</body>
</html>
