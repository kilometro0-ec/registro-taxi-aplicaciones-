<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>Driver Insights - Nuevo Gasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%); } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } } .animate-card { animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; } .rubro-btn.active-transporte { background-color: #004831; color: white; } .rubro-btn.active-electronica { background-color: #1E3A8A; color: white; } .loading-spinner { width: 24px; height: 24px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; } @keyframes spin { to { transform: rotate(360deg); } }</style>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<header class="bg-surface/80 backdrop-blur-md sticky top-0 z-40 border-b border-outline-variant flex justify-between items-center px-4 h-12 shadow-md">
    <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-tertiary to-tertiary-container flex items-center justify-center shadow-md"><span class="material-symbols-outlined text-white text-sm">receipt_long</span></div><h1 class="text-xl font-bold bg-gradient-to-r from-tertiary to-tertiary-container bg-clip-text text-transparent">Driver Insights</h1></div>
    <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-all active:scale-95"><span class="material-symbols-outlined text-on-surface-variant">arrow_back</span></button>
</header>
<main class="px-4 py-4 space-y-5 max-w-lg mx-auto">
    <div class="text-center animate-card"><h2 class="text-xl font-bold">Registrar Gasto</h2><p class="text-sm text-on-surface-variant">Selecciona el rubro y completa los datos</p></div>
    <section class="bg-white/80 backdrop-blur-sm border border-outline-variant rounded-xl p-5 shadow-lg animate-card">
        <label class="text-xs font-bold uppercase">RUBRO / NEGOCIO</label>
        <div class="grid grid-cols-2 gap-3 mt-2">
            <button id="rubroTransporte" class="rubro-btn active-transporte py-3 px-2 border border-transparent rounded-xl flex flex-col items-center gap-1" onclick="seleccionarRubro('Transporte')">🚖 Transporte</button>
            <button id="rubroElectronica" class="rubro-btn py-3 px-2 border border-outline-variant rounded-xl flex flex-col items-center gap-1" onclick="seleccionarRubro('Electrónica')">🤖 Electrónica</button>
        </div>
    </section>
    <div id="camposTransporte" class="space-y-4">
        <section class="bg-white/80 backdrop-blur-sm border border-outline-variant rounded-xl p-5 shadow-lg">
            <label class="text-xs font-bold uppercase">CATEGORÍA</label>
            <select id="categoriaTransporte" class="w-full mt-1 p-2.5 border rounded-xl" onchange="toggleKmField()">
                <option value="Combustible">⛽ Combustible</option>
                <option value="Mantenimiento">🔧 Mantenimiento</option>
                <option value="Lavado">🧼 Lavado</option>
                <option value="Peajes">🛣️ Peajes</option>
                <option value="Seguro">🛡️ Seguro</option>
                <option value="Comisión App">📱 Comisión App</option>
                <option value="Otros">📦 Otros</option>
            </select>
        </section>
        <!-- Campo de kilometraje (aparece solo para Combustible o Mantenimiento) -->
        <div id="kmFieldContainer" class="bg-white/80 backdrop-blur-sm border border-outline-variant rounded-xl p-5 shadow-lg hidden">
            <label class="text-xs font-bold uppercase">KILOMETRAJE ACTUAL (km)</label>
            <input type="number" id="kilometraje" step="0.1" class="w-full mt-1 p-2.5 border rounded-xl" placeholder="Ej: 12500.5">
            <p class="text-[10px] text-gray-500 mt-1">Obligatorio para Combustible y Mantenimiento</p>
        </div>
    </div>
    <div id="camposElectronica" class="hidden space-y-4">
        <section class="bg-white/80 backdrop-blur-sm border border-outline-variant rounded-xl p-5 shadow-lg">
            <label class="text-xs font-bold uppercase">CATEGORÍA</label>
            <select id="categoriaElectronica" class="w-full mt-1 p-2.5 border rounded-xl">
                <option value="Repuestos">🔩 Repuestos / Componentes</option>
                <option value="Herramientas">🛠️ Herramientas</option>
                <option value="Equipos">💻 Equipos de prueba</option>
                <option value="Insumos">📦 Insumos</option>
                <option value="Otros">📦 Otros</option>
            </select>
            <label class="text-xs font-bold uppercase mt-3 block">DETALLE / PROVEEDOR</label>
            <input type="text" id="detalleGasto" class="w-full p-2.5 border rounded-xl" placeholder="Ej: Pantalla, batería, estación de soldadura">
        </section>
    </div>
    <section class="bg-white/80 backdrop-blur-sm border border-outline-variant rounded-xl p-5 shadow-lg space-y-4">
        <div><label class="text-xs font-bold uppercase">MONTO (USD)</label><input type="number" step="0.01" id="monto" class="w-full p-2.5 border rounded-xl" placeholder="0.00"></div>
        <div><label class="text-xs font-bold uppercase">FECHA</label><input type="date" id="fecha" class="w-full p-2.5 border rounded-xl"></div>
        <div><label class="text-xs font-bold uppercase">DESCRIPCIÓN (opcional)</label><textarea id="descripcion" rows="2" class="w-full p-2.5 border rounded-xl" placeholder="Comentarios adicionales..."></textarea></div>
    </section>
    <div class="fixed bottom-20 left-0 w-full px-4 z-40"><button id="guardarBtn" class="w-full h-14 bg-gradient-to-r from-tertiary to-tertiary-container text-white rounded-2xl font-bold shadow-xl hover:shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-2"><span class="material-symbols-outlined">save</span> Guardar Gasto</button></div>
</main>
<nav class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t py-1 z-50"><div class="grid grid-cols-5 gap-1 text-center"><a href="Dashboard.html" class="flex flex-col items-center py-1 text-on-surface-variant"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px]">Panel</span></a><a href="registro_ingreso.html" class="flex flex-col items-center py-1 text-on-surface-variant"><span class="material-symbols-outlined">payments</span><span class="text-[10px]">Ingresos</span></a><a href="registro_gasto.html" class="flex flex-col items-center py-1 bg-tertiary-container/60 text-tertiary rounded-lg"><span class="material-symbols-outlined">receipt_long</span><span class="text-[10px]">Gastos</span></a><a href="vehiculo_mantenimiento.html" class="flex flex-col items-center py-1 text-on-surface-variant"><span class="material-symbols-outlined">directions_car</span><span class="text-[10px]">Vehículo</span></a><a href="reporte_estadisticas.html" class="flex flex-col items-center py-1 text-on-surface-variant"><span class="material-symbols-outlined">analytics</span><span class="text-[10px]">Análisis</span></a></div></nav>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzacjHoeZSpZj3bBnwkxjLez9-AMTzd4xk-sTGgLzMx2yj-FTEtPMcAUu0oW9fm-6ueTA/exec';
    let rubroActual = 'Transporte';

    function seleccionarRubro(rubro) {
        rubroActual = rubro;
        const btnT = document.getElementById('rubroTransporte'), btnE = document.getElementById('rubroElectronica');
        if (rubro === 'Transporte') { 
            btnT.classList.add('active-transporte'); btnT.classList.remove('border-outline-variant'); 
            btnE.classList.remove('active-transporte','active-electronica'); btnE.classList.add('border-outline-variant'); 
            document.getElementById('camposTransporte').classList.remove('hidden'); 
            document.getElementById('camposElectronica').classList.add('hidden');
            toggleKmField(); // mostrar/ocultar km según categoría inicial
        } else { 
            btnE.classList.add('active-electronica'); btnE.classList.remove('border-outline-variant'); 
            btnT.classList.remove('active-transporte','active-electronica'); btnT.classList.add('border-outline-variant'); 
            document.getElementById('camposTransporte').classList.add('hidden'); 
            document.getElementById('camposElectronica').classList.remove('hidden');
        }
    }

    function toggleKmField() {
        if (rubroActual !== 'Transporte') return;
        const categoria = document.getElementById('categoriaTransporte').value;
        const kmContainer = document.getElementById('kmFieldContainer');
        if (categoria === 'Combustible' || categoria === 'Mantenimiento') {
            kmContainer.classList.remove('hidden');
        } else {
            kmContainer.classList.add('hidden');
        }
    }

    document.getElementById('fecha').valueAsDate = new Date();
    document.getElementById('categoriaTransporte').addEventListener('change', toggleKmField);
    document.getElementById('guardarBtn').addEventListener('click', async () => {
        const monto = parseFloat(document.getElementById('monto').value);
        const fecha = document.getElementById('fecha').value;
        let desc = document.getElementById('descripcion').value;
        let categoria = '';
        let kilometraje = null;

        if (!monto || monto <= 0) { alert('Monto inválido'); return; }
        if (rubroActual === 'Transporte') {
            categoria = document.getElementById('categoriaTransporte').value;
            // Validar km si es Combustible o Mantenimiento
            if (categoria === 'Combustible' || categoria === 'Mantenimiento') {
                const kmInput = document.getElementById('kilometraje');
                kilometraje = parseFloat(kmInput.value);
                if (isNaN(kilometraje) || kilometraje <= 0) {
                    alert('Para gastos de Combustible o Mantenimiento es obligatorio ingresar el kilometraje actual.');
                    kmInput.focus();
                    return;
                }
            }
        } else {
            categoria = document.getElementById('categoriaElectronica').value;
            desc = `Detalle: ${document.getElementById('detalleGasto').value} | ${desc}`;
        }

        const params = new URLSearchParams();
        params.append('action', 'addExpense');
        params.append('categoria', categoria);
        params.append('rubro', rubroActual);
        params.append('monto', monto);
        params.append('fecha', fecha);
        params.append('descripcion', desc);
        if (kilometraje !== null) {
            params.append('kilometraje', kilometraje);
        }

        const btn = document.getElementById('guardarBtn'); 
        const original = btn.innerHTML;
        btn.innerHTML = '<div class="loading-spinner"></div> Guardando...'; 
        btn.disabled = true;
        try { 
            const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params }); 
            const text = await res.text(); 
            if (res.ok && text.includes('OK')) alert('✅ Gasto registrado'); 
            else alert('❌ Error: '+text); 
            location.href = 'Dashboard.html'; 
        } catch(e) { alert('Error de conexión: '+e.message); } 
        finally { btn.innerHTML = original; btn.disabled = false; }
    });

    seleccionarRubro('Transporte');
    toggleKmField(); // Inicializar visibilidad del campo km
</script>
</body>
</html>
