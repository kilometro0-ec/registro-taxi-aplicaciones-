<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Driver Companion | Inicio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0B2B40 0%, #0A1F2A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .bg-animation span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatDots 12s infinite linear;
        }
        @keyframes floatDots {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }
        .splash {
            position: relative;
            z-index: 10;
            background: rgba(15, 35, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 2rem;
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            animation: fadeSlideUp 0.8s ease;
        }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .car-icon { font-size: 5rem; margin-bottom: 1rem; animation: bounce 1.2s infinite alternate; }
        @keyframes bounce { 0% { transform: translateX(-8px); } 100% { transform: translateX(12px); } }
        .title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #00e0ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader { width: 48px; height: 48px; border: 4px solid rgba(0,255,255,0.2); border-top: 4px solid #00e0ff; border-radius: 50%; margin: 1.5rem auto 0; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .version { position: absolute; bottom: 20px; color: #5588a3; font-size: 0.7rem; text-align: center; width: 100%; z-index: 10; }
    </style>
</head>
<body>
<div class="bg-animation" id="particles"></div>
<div class="splash">
    <div class="car-icon">🚖💨</div>
    <div class="title">Driver Companion</div>
    <div style="color:#b3e4ff; margin: 0.5rem 0 1rem;">Uber · DiDi · Indriver</div>
    <div class="loader"></div>
    <div style="margin-top: 1.2rem; color:#9bc7e0;">Cargando panel de control...</div>
</div>
<div class="version">v2.0 · gestión inteligente</div>

<script>
    // partículas dinámicas
    const container = document.getElementById('particles');
    for(let i=0;i<60;i++) {
        const p = document.createElement('span');
        p.style.left = Math.random()*100 + '%';
        p.style.animationDelay = Math.random()*10 + 's';
        p.style.animationDuration = 6 + Math.random()*8 + 's';
        p.style.width = 2+Math.random()*5 + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
    }
    setTimeout(() => {
        document.querySelector('.splash').style.transition = 'opacity 0.4s';
        document.querySelector('.splash').style.opacity = '0';
        setTimeout(() => { window.location.href = 'Dashboard.html'; }, 350);
    }, 2600);
</script>
</body>
</html>
