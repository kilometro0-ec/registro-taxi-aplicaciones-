<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Driver & Tech Companion</title>
    <!-- PWA manifest con ruta absoluta a subcarpeta -->
    <link rel="manifest" href="/registro-taxi-aplicaciones-/manifest.json">
    <meta name="theme-color" content="#004831">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(145deg, #0B2B40 0%, #0A1F2A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .bg-animation span { position: absolute; width: 4px; height: 4px; background: rgba(0, 255, 255, 0.3); border-radius: 50%; animation: floatDots 12s infinite linear; }
        @keyframes floatDots { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20vh) scale(1); opacity: 0; } }
        .splash-container { position: relative; z-index: 10; text-align: center; padding: 2rem; background: rgba(15, 35, 45, 0.75); backdrop-filter: blur(12px); border-radius: 64px; box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 255, 255, 0.25); width: 85%; max-width: 400px; animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(40px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .car-animation { font-size: 5rem; margin-bottom: 1rem; animation: driveCar 1.4s ease-in-out infinite alternate; display: inline-block; }
        @keyframes driveCar { 0% { transform: translateX(-8px) rotate(0deg); } 100% { transform: translateX(12px) rotate(2deg); text-shadow: 0 0 8px #0ff; } }
        .brand-title { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #00e0ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
        .sub { color: #b3e4ff; font-weight: 500; margin-bottom: 1.8rem; font-size: 0.9rem; opacity: 0.9; }
        .loader { width: 48px; height: 48px; border: 4px solid rgba(0, 255, 255, 0.3); border-top: 4px solid #00e0ff; border-radius: 50%; margin: 1.5rem auto 0; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tagline { margin-top: 1.2rem; font-size: 0.8rem; color: #9bc7e0; font-weight: 400; }
        .version { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: #5588a3; z-index: 10; }
    </style>
</head>
<body>
<div class="bg-animation" id="particles"></div>
<div class="splash-container">
    <div class="car-animation">🚖🤖</div>
    <div class="brand-title">Driver & Tech Companion</div>
    <div class="sub">Uber · DiDi · Indriver · Electrónica</div>
    <div class="loader"></div>
    <div class="tagline">Gestión mixta para conductores y técnicos</div>
    <div class="tagline" style="margin-top: 6px;">Cargando dashboard unificado...</div>
</div>
<div class="version">v2.0 · control total</div>

<script>
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 55; i++) {
            const particle = document.createElement('span');
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 10}s`;
            particle.style.animationDuration = `${Math.random() * 8 + 6}s`;
            particle.style.opacity = Math.random() * 0.5;
            container.appendChild(particle);
        }
    }
    createParticles();

    setTimeout(() => {
        const splash = document.querySelector('.splash-container');
        splash.style.transition = 'opacity 0.4s ease, transform 0.3s';
        splash.style.opacity = '0';
        splash.style.transform = 'scale(0.96)';
        setTimeout(() => { window.location.href = '/registro-taxi-aplicaciones-/Dashboard.html'; }, 350);
    }, 2600);

    // Registrar Service Worker (ruta absoluta a la subcarpeta)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/registro-taxi-aplicaciones-/sw.js')
            .then(reg => console.log('Service Worker registrado:', reg))
            .catch(err => console.error('Error al registrar SW:', err));
    }
</script>
</body>
</html>
