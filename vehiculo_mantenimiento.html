<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vehículo y Mantenimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .tab-active { border-bottom: 3px solid #004831; color: #004831; font-weight: 600; }
    </style>
</head>
<body class="bg-surface text-on-surface pb-24">

<!-- Top App Bar -->
<header class="bg-surface border-b border-outline-variant sticky top-0 z-40 flex justify-between items-center px-4 h-12 w-full">
    <div class="flex items-center gap-2">
        <button onclick="history.back()" class="material-symbols-outlined text-primary">arrow_back</button>
        <h1 class="text-xl font-bold text-primary">Mi Vehículo</h1>
    </div>
    <button onclick="location.href='Dashboard.html'" class="material-symbols-outlined text-primary">home</button>
</header>

<main class="px-4 py-4 max-w-lg mx-auto space-y-5">

    <!-- Tabs -->
    <div class="flex border-b border-outline-variant">
        <button id="tabVehiculo" class="tab-active flex-1 py-2 text-center font-semibold text-sm transition-all" onclick="showTab('vehiculo')">Datos del Vehículo</button>
        <button id="tabMantenimiento" class="flex-1 py-2 text-center text-on-surface-variant text-sm transition-all" onclick="showTab('mantenimiento')">Registrar Servicio</button>
        <button id="tabHistorial" class="flex-1 py-2 text-center text-on-surface-variant text-sm transition-all" onclick="showTab('historial')">Historial</button>
    </div>

    <!-- ========== PANEL 1: DATOS DEL VEHÍCULO ========== -->
    <div id="panelVehiculo" class="space-y-4">
        <div class="bg-white rounded-xl border border-outline-variant p-5 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Modelo del vehículo</label>
                <input type="text" id="modelo" class="w-full p-3 border rounded-lg" placeholder="Ej: Toyota Corolla">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Año</label>
                <input type="number" id="anio" class="w-full p-3 border rounded-lg" placeholder="2020">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Kilometraje actual</label>
                <input type="number" id="kmActual" step="1" class="w-full p-3 border rounded-lg" placeholder="0">
                <button id="btnActualizarKm" class="mt-2 text-sm text-primary font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-sm">autorenew</span> Actualizar solo kilometraje</button>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Email para notificaciones</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg" placeholder="tu@email.com">
                <p class="text-xs text-on-surface-variant mt-1">Recibirás alertas de mantenimiento por correo (opcional)</p>
            </div>
            <button id="btnGuardarVehiculo" class="w-full bg-primary text-white py-3 rounded-xl font-bold mt-2">Guardar Datos</button>
        </div>
        <div class="bg-white rounded-xl border border-outline-variant p-4">
            <h3 class="font-bold mb-2">Alertas activas</h3>
            <div id="alertasPreview" class="space-y-2 text-sm"></div>
        </div>
    </div>

    <!-- ========== PANEL 2: REGISTRAR MANTENIMIENTO ========== -->
    <div id="panelMantenimiento" class="hidden space-y-4">
        <div class="bg-white rounded-xl border border-outline-variant p-5 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Tipo de servicio</label>
                <select id="tipoMantenimiento" class="w-full p-3 border rounded-lg">
                    <option value="aceite">Cambio de aceite</option>
                    <option value="frenos">Frenos</option>
                    <option value="neumaticos">Neumáticos</option>
                    <option value="transmision">Transmisión</option>
                    <option value="general">Revisión general</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Costo (USD)</label>
                <input type="number" id="costoMantenimiento" step="0.01" class="w-full p-3 border rounded-lg" placeholder="0.00">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Kilometraje al servicio</label>
                <input type="number" id="kmMantenimiento" step="1" class="w-full p-3 border rounded-lg" placeholder="km actual">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Fecha del servicio</label>
                <input type="date" id="fechaMantenimiento" class="w-full p-3 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Observaciones</label>
                <textarea id="obsMantenimiento" rows="2" class="w-full p-3 border rounded-lg" placeholder="Ej: cambio de aceite sintético"></textarea>
            </div>
            <button id="btnRegistrarMantenimiento" class="w-full bg-tertiary text-white py-3 rounded-xl font-bold">Registrar Servicio</button>
        </div>
    </div>

    <!-- ========== PANEL 3: HISTORIAL DE MANTENIMIENTOS ========== -->
    <div id="panelHistorial" class="hidden space-y-3">
        <div class="bg-white rounded-xl border border-outline-variant p-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold">Últimos servicios</h3>
                <button id="btnRefrescarHistorial" class="text-primary text-sm flex items-center gap-1"><span class="material-symbols-outlined text-sm">refresh</span> Actualizar</button>
            </div>
            <div id="historialList" class="space-y-3 max-h-96 overflow-y-auto">
                <!-- Aquí se cargarán dinámicamente los mantenimientos -->
                <p class="text-center text-on-surface-variant">Cargando historial...</p>
            </div>
        </div>
    </div>
</main>

<!-- Bottom Navigation (opcional, para coherencia) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-14 px-2 bg-surface border-t border-outline-variant">
    <a href="Dashboard.html" class="flex flex-col items-center text-on-surface-variant text-xs"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
    <a href="registro_ingresos.html" class="flex flex-col items-center text-on-surface-variant text-xs"><span class="material-symbols-outlined">payments</span><span>Ingresos</span></a>
    <a href="registro_gastos.html" class="flex flex-col items-center text-on-surface-variant text-xs"><span class="material-symbols-outlined">receipt_long</span><span>Gastos</span></a>
    <a href="vehiculo_mantenimiento.html" class="flex flex-col items-center bg-primary-container text-primary rounded-lg px-3 py-1 text-xs"><span class="material-symbols-outlined">directions_car</span><span>Vehículo</span></a>
    <a href="reporte_estadisticas.html" class="flex flex-col items-center text-on-surface-variant text-xs"><span class="material-symbols-outlined">analytics</span><span>Analytics</span></a>
</nav>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqiJKDDXKRM_7xBR8NhDC43BVpsyrqyI3mZeY5w_w6vroHubh1KjlBExGw66MmeZX_Rg/exec';  // <--- REEMPLAZA

    // Mostrar pestañas
    function showTab(tab) {
        document.getElementById('panelVehiculo').classList.add('hidden');
        document.getElementById('panelMantenimiento').classList.add('hidden');
        document.getElementById('panelHistorial').classList.add('hidden');
        document.getElementById(`panel${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');

        document.getElementById('tabVehiculo').classList.remove('tab-active');
        document.getElementById('tabMantenimiento').classList.remove('tab-active');
        document.getElementById('tabHistorial').classList.remove('tab-active');
        document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('tab-active');

        if (tab === 'historial') cargarHistorial();
        if (tab === 'vehiculo') cargarDatosVehiculo();
    }

    // Cargar datos actuales del vehículo
    async function cargarDatosVehiculo() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getVehiculo`);
            const v = await res.json();
            if (v && v.modelo) {
                document.getElementById('modelo').value = v.modelo || '';
                document.getElementById('anio').value = v.anio || '';
                document.getElementById('kmActual').value = v.km_actual || 0;
                document.getElementById('email').value = v.email || '';
            }
            // Cargar alertas preview
            const resAlertas = await fetch(`${SCRIPT_URL}?action=getAlertas`);
            const alertas = await resAlertas.json();
            const container = document.getElementById('alertasPreview');
            if (container) {
                container.innerHTML = alertas.map(a => `<div class="p-2 rounded-lg ${a.urgente ? 'bg-red-50 text-red-800' : 'bg-yellow-50'} text-sm">${a.mensaje}</div>`).join('');
                if (alertas.length === 0) container.innerHTML = '<div class="text-green-600">✅ Todo en orden</div>';
            }
        } catch(e) { console.error(e); }
    }

    // Guardar datos del vehículo
    document.getElementById('btnGuardarVehiculo').addEventListener('click', async () => {
        const params = new URLSearchParams();
        params.append('action', 'updateVehicle');
        params.append('modelo', document.getElementById('modelo').value);
        params.append('anio', document.getElementById('anio').value);
        params.append('km_actual', document.getElementById('kmActual').value);
        params.append('email', document.getElementById('email').value);
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: params });
        alert('Datos guardados');
        cargarDatosVehiculo();
    });

    // Actualizar solo kilometraje
    document.getElementById('btnActualizarKm').addEventListener('click', async () => {
        const km = document.getElementById('kmActual').value;
        const params = new URLSearchParams();
        params.append('action', 'updateKm');
        params.append('km', km);
        await fetch(SCRIPT_URL, { method: 'POST', body: params });
        alert(`Kilometraje actualizado a ${km} km`);
        cargarDatosVehiculo();
    });

    // Registrar mantenimiento
    document.getElementById('btnRegistrarMantenimiento').addEventListener('click', async () => {
        const tipo = document.getElementById('tipoMantenimiento').value;
        const costo = parseFloat(document.getElementById('costoMantenimiento').value);
        const km = parseInt(document.getElementById('kmMantenimiento').value);
        const fecha = document.getElementById('fechaMantenimiento').value;
        const obs = document.getElementById('obsMantenimiento').value;

        if (isNaN(costo) || costo <= 0) { alert('Costo inválido'); return; }
        if (isNaN(km) || km <= 0) { alert('Kilometraje inválido'); return; }
        if (!fecha) { alert('Selecciona fecha'); return; }

        const params = new URLSearchParams();
        params.append('action', 'addMaintenance');
        params.append('tipo', tipo);
        params.append('costo', costo);
        params.append('kilometraje', km);
        params.append('fecha', fecha);
        params.append('observaciones', obs);

        await fetch(SCRIPT_URL, { method: 'POST', body: params });
        alert('Servicio registrado');
        // Limpiar campos
        document.getElementById('costoMantenimiento').value = '';
        document.getElementById('obsMantenimiento').value = '';
        document.getElementById('kmMantenimiento').value = '';
        // Actualizar km actual si es mayor
        const kmActualInput = document.getElementById('kmActual');
        if (km > parseInt(kmActualInput.value)) {
            kmActualInput.value = km;
            await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'updateKm', km: km }) });
        }
        cargarDatosVehiculo();
    });

    // Cargar historial de mantenimientos
    async function cargarHistorial() {
        const container = document.getElementById('historialList');
        container.innerHTML = '<p class="text-center">Cargando...</p>';
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getHistorialMantenimientos`);
            const historial = await res.json();
            if (!historial.length) {
                container.innerHTML = '<p class="text-center text-on-surface-variant">No hay servicios registrados aún.</p>';
                return;
            }
            container.innerHTML = historial.map(m => `
                <div class="border-b pb-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold capitalize">${m.tipo}</p>
                            <p class="text-xs text-on-surface-variant">${m.fecha_servicio} • ${m.kilometraje} km</p>
                            <p class="text-xs">${m.observaciones || ''}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-tertiary">$${parseFloat(m.costo).toFixed(2)}</p>
                            <p class="text-[10px]">Próximo: ${m.proximo_km} km</p>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) { container.innerHTML = '<p class="text-red-500">Error al cargar historial</p>'; }
    }

    // Fecha por defecto en el formulario de mantenimiento
    document.getElementById('fechaMantenimiento').valueAsDate = new Date();

    // Inicializar
    cargarDatosVehiculo();
    showTab('vehiculo');
</script>
</body>
</html>
